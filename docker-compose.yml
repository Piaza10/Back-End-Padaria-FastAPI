version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: padaria_db_container
    restart: always
    environment:
      POSTGRES_USER: padaria_user
      POSTGRES_PASSWORD: baker123
      POSTGRES_DB: padaria_db
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: padaria_pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@padaria.com
      PGADMIN_DEFAULT_PASSWORD: baker123
    # Libera o pgAdmin no seu navegador em http://localhost:8080
    ports:
      - "8080:80"
    depends_on:
      - db

  web:
    build: .
    container_name: padaria_app
    # Se o banco não estiver pronto, o alembic vai falhar e o Docker vai reiniciar o app automaticamente
    restart: on-failure
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: